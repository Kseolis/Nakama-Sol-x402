# Tier-1 CI: feature/* -> stage
# Implements .claude/rules/ci-gates.md "Tier 1"
# Goal: fast feedback on PR to stage (P95 <= 12 min). Blocking gates only.

name: CI feature -> stage

on:
  pull_request:
    branches:
      - stage
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-feature-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # NOTE: `-D warnings` applied via `clippy -- -D warnings` per step, not via
  # global RUSTFLAGS — otherwise `cargo install <tool>` builds fail on any
  # transitive deprecation warning, breaking the pipeline for unrelated reasons.

jobs:
  rust-fmt:
    name: T1-1 Rust fmt (both workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (1.89.0 per nakama/rust-toolchain.toml)
        run: rustup show
      - name: cargo fmt root workspace
        run: cargo fmt --all -- --check
      - name: cargo fmt nakama workspace
        run: cd nakama && cargo fmt --all -- --check

  ts-typecheck:
    name: T1-2 TS strict typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/ts/package-lock.json
      - name: npm ci
        run: cd clients/ts && npm ci
      - name: tsc --noEmit (strict)
        run: cd clients/ts && npx tsc --noEmit

  rust-clippy:
    name: T1-3 Rust clippy -D warnings
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            nakama -> nakama/target
      - name: clippy root workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: clippy nakama workspace
        run: cd nakama && cargo clippy --workspace --all-targets -- -D warnings

  rust-tests:
    name: T1-4 Rust tests (both workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            nakama -> nakama/target
      # LiteSVM tests load nakama.so via `add_program_from_file` (see
      # nakama/programs/nakama/tests/common/mod.rs:84). The .so is BPF-target
      # output, not produced by `cargo test`. Use `cargo build-sbf` (provided
      # by Solana CLI 2.0.21) — lighter than full anchor build, only ~5 min
      # cold install, ~10 sec warm via cache.
      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-2.2.0-${{ runner.os }}
      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v2.2.0/install)"
      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Build BPF program (.so artifact for LiteSVM tests)
        run: cd nakama && cargo build-sbf
      - name: cargo test off-chain
        run: cargo test --workspace
      - name: cargo test on-chain (LiteSVM)
        run: cd nakama && cargo test --workspace --tests

  # T1-5 anchor-build moved to Tier-2 (ci-release.yml) — Anchor CLI install
  # via `cargo install --git` is ~8 min uncached, exceeds Tier-1 P95 12-min
  # budget. cargo check + clippy on the on-chain crate catches 90% of breakage
  # at 10x speed (already covered by T1-3 / T1-4). Full anchor build runs only
  # on stage→main release-cut PRs where the 20-min cost is acceptable.

  yaml-lint:
    name: T1-6 actionlint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color
